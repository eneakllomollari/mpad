<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>
  <!-- Background: rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Markdown down-arrow symbol, minimal -->
  <g transform="translate(512,512)" fill="none" stroke="#c4603c" stroke-width="56" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left vertical + diagonal -->
    <polyline points="-240,180 -240,-180 -80,-20 80,-180 80,180"/>
    <!-- Right arrow down -->
    <line x1="240" y1="-180" x2="240" y2="140"/>
    <polyline points="160,60 240,180 320,60"/>
  </g>
</svg>
