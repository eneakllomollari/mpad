# Runs Expect browser tests in CI on every pull request.
# Expect reads the PR diff, generates a test plan, and validates changes in a real browser.
name: Expect CI

on:
  pull_request:
    branches: [main]

jobs:
  expect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      EXPECT_BASE_URL: ${{ vars.EXPECT_BASE_URL || 'http://localhost:5173' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit firefox

      - name: Start dev server
        if: ${{ !vars.EXPECT_BASE_URL }}
        run: bun run dev &

      - name: Wait for dev server
        run: npx wait-on $EXPECT_BASE_URL --timeout 60000

      - name: Run expect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx expect-cli@latest --ci

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expect-test-results
          path: .expect/sessions/
          if-no-files-found: ignore
