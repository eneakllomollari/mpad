name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    needs: ci
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: mpad-aarch64.zip
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: mpad-x86_64.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bunx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Zip app bundle
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          zip -r ${{ github.workspace }}/${{ matrix.artifact }} mpad.app

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Verify artifacts
        run: ls -la *.zip

      - name: Check if versioned release exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create versioned release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: mpad ${{ steps.version.outputs.tag }}
          body: |
            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/eneakllomollari/mpad/main/install.sh | bash
            ```

            Or download the zip for your architecture below.
          files: |
            mpad-aarch64.zip
            mpad-x86_64.zip
          prerelease: false
          make_latest: false

      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          name: Latest Build (${{ steps.version.outputs.tag }})
          body: |
            Rolling release — always points to the newest build from `main`.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** ${{ github.sha }}

            ## Install

            ```sh
            curl -fsSL https://raw.githubusercontent.com/eneakllomollari/mpad/main/install.sh | bash
            ```
          files: |
            mpad-aarch64.zip
            mpad-x86_64.zip
          prerelease: false
          make_latest: true
